<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 0;
      align-items: center;
      justify-content: center;
      width: auto;
      background-color: aliceblue;
      overflow:auto;
    }

    header {
      padding: 35px;
      background-color: antiquewhite;
      text-align: center;
      text-transform: uppercase;
      font-size: 25px;
    }

    .container{
        display: 0 100px;
    }

    .card {
      text-align: center;
    }

    /* navbar*/
    .topnav {
      background-color: rgb(165, 42, 42, 0.8);
      overflow: hidden;
    }

    .topnav a{
      display: block;
      float: left;
      padding: 14px 16px;
      text-decoration: none;
      color: white;
    }

    .topnav a:hover{
      background-color: aliceblue;
      color: black;
    }

    a.highlight:hover {
      font-size: 27px;
    }

    h1 {
      border-left: 6px solid brown;
      margin-left: 20px;
      color: black;
      font-family:
      "Gill Sans", "Gill Sans MT", Calibri, "Trebuchet MS", sans-serif;
    }

    p {
      border-bottom: 6px solid brown;
      color: brown;
      margin: 20px;
      font-size: large;
    }

    /* button*/
    input[type="submit"] {
      position: static;
      margin: 25px;
      margin-top: 35px;
      padding: 10px 20px;
      border-radius: 20px;
      background-color: brown;
      color: aliceblue;
    }

    .parent{
      display: flex;
      align-items: center;
      justify-content: center;
      max-height: 400px;
    }

    .parent div{
      background:blanchedalmond;
      width: 335px;
      height: 200px;
      margin: 30px;
      text-align: center;
      border-radius: 19px;
      box-shadow: 0px 9px 11px rgba(1, 1, 1, .4);
    }

    .circle-img{
        width: 130px;
          height: 130px;
          border-radius: 50%;
          object-fit: cover;
          float: right;
          margin:10px 30px;
          

    }
  </style>
  <body>
    <header>welcome to our website</header>
    <div class="topnav">
        <a class="highlight" href="#">Home</a>
        <a class="highlight" href="#">About</a>
        <a class="highlight" href="#">Gallery</a>
        <a class="highlight" href="#">Contact</a>
        <a class="highlight" href="#">Login</a>
      </div>

       <div class="img">
      <img src="pizza.webp" class="circle-img" alt="pizza";>
    </div>

    <h1>
      Healthy Diet<br />
      Everyday
    </h1>
   
    <p>
      order today and receive your<br />
      packege tomorrow
    </p>
    <div class="parent">
      <div>
        <h3>Box 1</h3>
        <p>life is good when you<br> 
          have good food</p>
      </div>

      <div>
        <h3>Box 2</h3>
        <p>life is like an ice-creem <br>
        enjoy it before it melts</p>
      </div>
    </div>

    <input type="submit" value="order">
    <input type="submit" value="cancel">

  </body>
</html>
